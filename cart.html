<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cart</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="icon" href="assets/icon.png">
</head>
<body>
    <div class="cart-page">
        <div class="cart-hero">
            <h1>YOUR CART</h1>
            <p class="cart-subtitle">Secure checkout is coming soon.</p>

            <div class="cart-toolbar" aria-label="Cart summary">
                <i class="fa-solid fa-cart-arrow-down" aria-hidden="true"></i>
                <span class="cart-count-label">Items:</span>
                <i class="fa-solid fa-xmark cart-close" aria-hidden="true" title="Remove items" style="display:none"></i>
            </div>
        </div>

        <div class="cart-card" id="cart-container">
            <p id="cartempty-msg">YOUR CART IS CURRENTLY UNAVAILABLE.</p>
            <div class="cart-empty-details">
                <p>Everything you love is just one click away.</p>
                <div class="cart-image">
                    <img src="assets/ChatGPT Image May 2, 2026, 01_29_20 AM.png" alt="Cart illustration" />
                </div>
                <div class="cart-status">
                    <hr />
                    <p>STILL UNDERCONSTRUCTION.</p>
                    <hr />
                </div>
            </div>
        </div>

        <div class="cart-actions">
            <button class="cartprimary-btn">
                <a href="products.html">CONTINUE SHOPPING</a>
            </button>
        </div>
    </div>
</body>
</html>
